services:
  app:
    build:
      context: .
    environment:
      APP_NAME: ${APP_NAME:-playground-clip}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./local.db}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST:-http://opensearch:9200}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-products}
      OPENSEARCH_VECTOR_FIELD: ${OPENSEARCH_VECTOR_FIELD:-image_vector}
      OPENSEARCH_VECTOR_DIMENSION: ${OPENSEARCH_VECTOR_DIMENSION:-512}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CLIP_MODEL_NAME: ${CLIP_MODEL_NAME:-ViT-B-32}
      CLIP_PRETRAINED: ${CLIP_PRETRAINED:-laion2b_s34b_b79k}
      CLIP_DEVICE: ${CLIP_DEVICE:-cpu}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_started

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  opensearch-data:
  redis-data:
